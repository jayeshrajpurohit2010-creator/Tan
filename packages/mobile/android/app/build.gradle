apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "kotlin-android"

/**
 * React Native configuration for Tan Mobile.
 */
react {
    // The root of your project, i.e. where "package.json" lives
    root = file("../../")
    // The folder where the react-native NPM package is
    reactNativeDir = file("../../node_modules/react-native")
    // The folder where the react-native Codegen package is
    codegenDir = file("../../node_modules/@react-native/codegen")
    // The cli.js file which is the React Native CLI entrypoint
    cliFile = file("../../node_modules/react-native/cli.js")
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.tan.mobile"

    defaultConfig {
        applicationId  "com.tan.mobile"
        minSdk         rootProject.ext.minSdkVersion
        targetSdk      rootProject.ext.targetSdkVersion
        versionCode    1
        versionName    "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile     file('debug.keystore')
            storePassword 'android'
            keyAlias      'androiddebugkey'
            keyPassword   'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled    true
            shrinkResources  true
            proguardFiles    getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            signingConfig    signingConfigs.debug   // Replace with release keystore before publishing
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation("org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion")
}
