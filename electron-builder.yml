appId: com.tan.synchronizer
productName: Tan
copyright: Copyright (c) 2026 Tan

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true
compression: normal

win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: Tan-${version}-${os}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Tan

mac:
  identity: null
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: Tan-${version}-${os}-${arch}.${ext}

dmg:
  sign: false

publish: null
