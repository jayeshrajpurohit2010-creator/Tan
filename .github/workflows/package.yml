name: Package Tan

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test & Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f9d6820020 # v4.10.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  windows:
    name: Windows installer
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f9d6820020 # v4.10.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Generate checksums
        run: |
          cd release
          Get-FileHash Tan-*.exe -Algorithm SHA256 | Format-Table -AutoSize | Out-File checksums.txt
          Get-FileHash Tan-*.zip -Algorithm SHA256 | Format-Table -AutoSize | Out-File -Append checksums.txt

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tan-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/checksums.txt

  macos:
    name: macOS installer
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f9d6820020 # v4.10.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG and ZIP
        run: npm run dist:mac

      - name: Generate checksums
        run: |
          cd release
          shasum -a 256 Tan-*.dmg Tan-*.zip > checksums.txt

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tan-macos
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/checksums.txt
